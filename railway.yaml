# Railway 部署配置文件
# https://railway.app/docs/reference/registry

$schema: https://openschema.railway.app/railway-schema.json

# 构建配置
build:
  builder: NIXPACKS
  buildCommand: pnpm install && pnpm prisma generate && pnpm build

# 部署配置
deploy:
  startCommand: pnpm start
  # 健康检查（可选，需要后端支持）
  healthcheckPath: /health
  # 重启策略
  restartPolicyType: ON_FAILURE

# 环境变量（在 Railway 控制台配置）
# 必需的环境变量:
# - DATABASE_URL (由 PostgreSQL 插件自动提供)
# - OPENAI_API_KEY (阿里云通义千问 API Key)
# - JWT_SECRET (JWT 签名密钥)
# - PORT (默认 3000，Railway 会自动设置)
